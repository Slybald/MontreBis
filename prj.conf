# --- Logging & Console ---
CONFIG_LOG=y
CONFIG_LOG_MODE_DEFERRED=y
CONFIG_CONSOLE=y
CONFIG_UART_CONSOLE=y
CONFIG_LOG_BACKEND_UART=y
CONFIG_CBPRINTF_FP_SUPPORT=y

# --- System & Stack ---
# Main thread only does init then sleeps — real work in dedicated threads.
CONFIG_MAIN_STACK_SIZE=4096
CONFIG_SYSTEM_WORKQUEUE_STACK_SIZE=2048
CONFIG_SHELL=y

# --- Multitasking (Event-Driven Architecture) ---
CONFIG_THREAD_NAME=y

# --- FPU (Cortex-M33 single-precision, disabled to avoid TF-M CP10/CP11 config issue) ---
# CONFIG_FPU=y
# CONFIG_FPU_SHARING=y

# --- Peripherals ---
CONFIG_GPIO=y
CONFIG_SPI=y
CONFIG_I2C=y
CONFIG_PINCTRL=y
CONFIG_REGULATOR=y
CONFIG_REGULATOR_FIXED=y

# --- nRF5340 Specific Fixes ---
# Disable TFM Secure UART to prevent conflict with I2C1 (both share ID 9)
CONFIG_TFM_SECURE_UART=n
CONFIG_TFM_LOG_LEVEL_SILENCE=y

# --- Bluetooth Low Energy ---
CONFIG_BT=y
CONFIG_BT_PERIPHERAL=y
CONFIG_BT_DEVICE_NAME="Connected Watch"
CONFIG_BT_DEVICE_APPEARANCE=833

# BLE Stack Configuration
CONFIG_BT_ATT_PREPARE_COUNT=5
CONFIG_BT_BUF_ACL_RX_SIZE=251
CONFIG_BT_BUF_ACL_TX_SIZE=251
CONFIG_BT_L2CAP_TX_MTU=247
CONFIG_BT_GATT_CLIENT=n

# Disable GATT Caching (requires AES-CMAC not enabled in TFM/PSA by default)
CONFIG_BT_GATT_CACHING=n

# --- RTC (Real Time Clock - RV-8263-C8) ---
CONFIG_RTC=y

# --- Sensors (X-NUCLEO-IKS01A3) ---
CONFIG_SENSOR=y
# Disable triggers to use polling mode
CONFIG_LIS2MDL_TRIGGER_NONE=y
CONFIG_LPS22HH_TRIGGER_NONE=y
CONFIG_LSM6DSO_TRIGGER_NONE=y

# --- Display & UI (LVGL) ---
CONFIG_DISPLAY=y
CONFIG_LVGL=y
CONFIG_LV_Z_AUTO_INIT=y
CONFIG_LV_Z_MEM_POOL_SIZE=32768
CONFIG_LV_Z_SHELL=y

# Display Driver Settings
# Use Zephyr INPUT with the local TSC2007 driver for the resistive shield.
CONFIG_INPUT=y
# Match ILI9341 hardware color depth (16-bit RGB565)
CONFIG_LV_COLOR_DEPTH_16=y
CONFIG_LV_Z_BITS_PER_PIXEL=16
CONFIG_LV_Z_VDB_SIZE=20

# LVGL Widgets & Fonts
CONFIG_LV_USE_LABEL=y
CONFIG_LV_USE_LINE=y
CONFIG_LV_USE_ARC=y
CONFIG_LV_USE_BAR=y
CONFIG_LV_USE_CALENDAR=y
CONFIG_LV_USE_CALENDAR_HEADER_ARROW=y
CONFIG_LV_FONT_MONTSERRAT_14=y
CONFIG_LV_FONT_MONTSERRAT_16=y
CONFIG_LV_FONT_MONTSERRAT_28=y
CONFIG_LV_USE_FONT_COMPRESSED=y

# --- Non-Volatile Storage (Settings Persistence) ---
CONFIG_NVS=y
CONFIG_FLASH=y
CONFIG_FLASH_MAP=y
CONFIG_FLASH_PAGE_LAYOUT=y
CONFIG_SETTINGS=y
CONFIG_SETTINGS_NVS=y

# --- Watchdog (disabled until feed logic is implemented in controller) ---
# CONFIG_WATCHDOG=y
# CONFIG_WDT_DISABLE_AT_BOOT=n
